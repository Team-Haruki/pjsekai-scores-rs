name: Release CLI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing GitHub Release tag to upload assets to
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build CLI (${{ matrix.platform.target }}, ${{ matrix.variant.name }})
    strategy:
      matrix:
        platform:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            ext: ""
          - target: aarch64-apple-darwin
            os: macos-15
            ext: ""
          - target: x86_64-apple-darwin
            os: macos-15
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: ".exe"
        variant:
          - name: standard
            suffix: ""
            cargo_args: ""
          - name: skia-image
            suffix: "-skia-image"
            cargo_args: "--features skia-image"
    runs-on: ${{ matrix.platform.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set version from tag
        if: github.event_name == 'release' || inputs.release_tag != ''
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.release_tag }}"
            VERSION="${VERSION#v}"
          fi
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            sed -i '' "1,/^version = .*/{s/^version = .*/version = \"${VERSION}\"/;}" Cargo.toml
          else
            sed -i "0,/^version = .*/s//version = \"${VERSION}\"/" Cargo.toml
          fi
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: Install Skia Linux dependencies
        if: runner.os == 'Linux' && matrix.variant.name == 'skia-image'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev libfreetype6-dev
      - name: Build
        run: cargo build --release --target ${{ matrix.platform.target }} --bin pjsekai-scores-rs ${{ matrix.variant.cargo_args }}
      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.platform.target }}/release/pjsekai-scores-rs${{ matrix.platform.ext }} \
             dist/pjsekai-scores-rs${{ matrix.variant.suffix }}-${{ matrix.platform.target }}${{ matrix.platform.ext }}
      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: cli-${{ matrix.variant.name }}-${{ matrix.platform.target }}
          path: dist/

  publish:
    name: Upload to GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release' || inputs.release_tag != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          pattern: cli-*
          merge-multiple: true
          path: dist/
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event_name == 'release' && github.ref_name || inputs.release_tag }}
        run: |
          for f in dist/*; do
            gh release upload "$RELEASE_TAG" "$f" --clobber
          done
