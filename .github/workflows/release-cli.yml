name: Release CLI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build CLI (${{ matrix.platform.target }}, ${{ matrix.variant.name }})
    strategy:
      matrix:
        platform:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            ext: ""
          - target: aarch64-apple-darwin
            os: macos-15
            ext: ""
          - target: x86_64-apple-darwin
            os: macos-15
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: ".exe"
        variant:
          - name: standard
            suffix: ""
            cargo_args: ""
          - name: skia-image
            suffix: "-skia-image"
            cargo_args: "--features skia-image"
    runs-on: ${{ matrix.platform.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set version from tag
        if: github.event_name == 'release'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            sed -i '' "1,/^version = .*/{s/^version = .*/version = \"${VERSION}\"/;}" Cargo.toml
          else
            sed -i "0,/^version = .*/s//version = \"${VERSION}\"/" Cargo.toml
          fi
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --target ${{ matrix.platform.target }} --bin pjsekai-scores-rs ${{ matrix.variant.cargo_args }}
      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.platform.target }}/release/pjsekai-scores-rs${{ matrix.platform.ext }} \
             dist/pjsekai-scores-rs${{ matrix.variant.suffix }}-${{ matrix.platform.target }}${{ matrix.platform.ext }}
      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: cli-${{ matrix.variant.name }}-${{ matrix.platform.target }}
          path: dist/

  publish:
    name: Upload to GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          pattern: cli-*
          merge-multiple: true
          path: dist/
      - name: Upload release assets
        run: |
          for f in dist/*; do
            gh release upload "${{ github.ref_name }}" "$f" --clobber
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
