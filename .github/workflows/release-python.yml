name: Release Python

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # Build wheels for Linux (x86_64, aarch64)
  # ──────────────────────────────────────────────
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
        package:
          - name: pjsekai-scores-rs
            artifact: default
            features: python
            pyproject_features: '["python"]'
          - name: pjsekai-scores-rs-skia-image
            artifact: skia-image
            features: python,skia-image
            pyproject_features: '["python", "skia-image"]'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set Python package metadata
        run: bash .github/scripts/configure-python-package.sh
        env:
          PYTHON_PACKAGE_NAME: ${{ matrix.package.name }}
          MATURIN_FEATURES_TOML: ${{ matrix.package.pyproject_features }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter --features ${{ matrix.package.features }}
          sccache: "true"
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.package.artifact }}-linux-${{ matrix.target }}
          path: dist

  # ──────────────────────────────────────────────
  # Build free-threaded wheels for Linux (x86_64, aarch64)
  # manylinux_2_28 containers include 3.13t / 3.14t
  # aarch64 already gets free-threaded via manylinux auto;
  # only x86_64 needs the manylinux_2_28 container.
  # ──────────────────────────────────────────────
  linux-freethreaded:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64]
        package:
          - name: pjsekai-scores-rs
            artifact: default
            features: python
            pyproject_features: '["python"]'
          - name: pjsekai-scores-rs-skia-image
            artifact: skia-image
            features: python,skia-image
            pyproject_features: '["python", "skia-image"]'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set Python package metadata
        run: bash .github/scripts/configure-python-package.sh
        env:
          PYTHON_PACKAGE_NAME: ${{ matrix.package.name }}
          MATURIN_FEATURES_TOML: ${{ matrix.package.pyproject_features }}
      - name: Build free-threaded wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter python3.13t python3.14t --features ${{ matrix.package.features }}
          sccache: "true"
          manylinux: manylinux_2_28
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.package.artifact }}-linux-ft-${{ matrix.target }}
          path: dist

  # ──────────────────────────────────────────────
  # Build wheels for macOS (x86_64, aarch64)
  # ──────────────────────────────────────────────
  macos:
    runs-on: macos-15
    strategy:
      matrix:
        target: [x86_64, aarch64]
        package:
          - name: pjsekai-scores-rs
            artifact: default
            features: python
            pyproject_features: '["python"]'
          - name: pjsekai-scores-rs-skia-image
            artifact: skia-image
            features: python,skia-image
            pyproject_features: '["python", "skia-image"]'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set Python package metadata
        run: bash .github/scripts/configure-python-package.sh
        env:
          PYTHON_PACKAGE_NAME: ${{ matrix.package.name }}
          MATURIN_FEATURES_TOML: ${{ matrix.package.pyproject_features }}
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: |
            3.9
            3.10
            3.11
            3.12
            3.13
            3.14
            3.14t
          allow-prereleases: true
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter --features ${{ matrix.package.features }}
          sccache: "true"
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.package.artifact }}-macos-${{ matrix.target }}
          path: dist

  # ──────────────────────────────────────────────
  # Build wheels for Windows (x86_64)
  # ──────────────────────────────────────────────
  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        package:
          - name: pjsekai-scores-rs
            artifact: default
            features: python
            pyproject_features: '["python"]'
          - name: pjsekai-scores-rs-skia-image
            artifact: skia-image
            features: python,skia-image
            pyproject_features: '["python", "skia-image"]'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set Python package metadata
        shell: bash
        run: bash .github/scripts/configure-python-package.sh
        env:
          PYTHON_PACKAGE_NAME: ${{ matrix.package.name }}
          MATURIN_FEATURES_TOML: ${{ matrix.package.pyproject_features }}
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: |
            3.9
            3.10
            3.11
            3.12
            3.13
            3.14
            3.14t
          allow-prereleases: true
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: --release --out dist --find-interpreter --features ${{ matrix.package.features }}
          sccache: "true"
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.package.artifact }}-windows-x64
          path: dist

  # ──────────────────────────────────────────────
  # Build source distribution
  # ──────────────────────────────────────────────
  sdist:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - name: pjsekai-scores-rs
            artifact: default
            pyproject_features: '["python"]'
          - name: pjsekai-scores-rs-skia-image
            artifact: skia-image
            pyproject_features: '["python", "skia-image"]'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set Python package metadata
        run: bash .github/scripts/configure-python-package.sh
        env:
          PYTHON_PACKAGE_NAME: ${{ matrix.package.name }}
          MATURIN_FEATURES_TOML: ${{ matrix.package.pyproject_features }}
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: wheels-sdist-${{ matrix.package.artifact }}
          path: dist

  # ──────────────────────────────────────────────
  # Publish all wheels + sdist to PyPI
  # ──────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [linux, linux-freethreaded, macos, windows, sdist]
    if: github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/p/pjsekai-scores-rs
    permissions:
      id-token: write
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      - name: Publish to PyPI
        run: uv publish --trusted-publishing always dist/*
